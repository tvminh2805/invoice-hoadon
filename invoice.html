<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hóa đơn nhiệt</title>
    <style>
        /* === RESET & CẤU HÌNH IN 80MM === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #fff;
            margin: 0;
            padding: 0;
            width: 80mm;
            font-size: 12px;
            line-height: 1.4;
        }

        /* Container chính - khổ 80mm */
        .invoice-80mm {
            width: 80mm;
            padding: 2mm 3mm;
            margin: 0 auto;
            background: #fff;
        }

        /* === CÁC THÀNH PHẦN CỦA HÓA ĐƠN === */
        .header {
            text-align: center;
            border-bottom: 1px dashed #000;
            padding-bottom: 6px;
            margin-bottom: 6px;
        }

        .header h1 {
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 2px;
            margin: 4px 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        .header .invoice-number {
            font-size: 14px;
            font-weight: bold;
            margin-top: 2px;
            font-family: Arial, Helvetica, sans-serif;
        }

        .header .store-name {
            font-size: 14px;
            font-weight: bold;
            font-family: Arial, Helvetica, sans-serif;
        }

        .header .store-info {
            font-size: 10px;
            color: #333;
            font-family: Arial, Helvetica, sans-serif;
        }

        /* Thông tin khách hàng */
        .customer-info {
            border-bottom: 1px dashed #000;
            padding-bottom: 6px;
            margin-bottom: 6px;
            font-size: 11px;
            font-family: Arial, Helvetica, sans-serif;
        }

        .customer-info p {
            margin: 2px 0;
        }

        .customer-info .label {
            font-weight: bold;
        }

        /* Bảng sản phẩm */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
            margin: 4px 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        table th {
            text-align: center;
            font-weight: bold;
            border-bottom: 1px solid #000;
            padding: 4px 0;
            font-size: 10px;
            text-transform: uppercase;
            font-family: Arial, Helvetica, sans-serif;
        }

        table td {
            padding: 3px 0;
            border-bottom: 1px dotted #ccc;
            vertical-align: top;
            font-family: Arial, Helvetica, sans-serif;
        }

        /* Căn chỉnh các cột */
        .col-stt {
            width: 8%;
            text-align: center;
        }
        .col-name {
            width: 40%;
            text-align: left;
            padding-right: 4px;
        }
        .col-qty {
            width: 12%;
            text-align: center;
        }
        .col-price {
            width: 18%;
            text-align: right;
            padding-right: 4px;
        }
        .col-amount {
            width: 22%;
            text-align: right;
        }

        /* Tổng tiền */
        .total-row {
            font-weight: bold;
            font-size: 14px;
            border-top: 2px solid #000;
            padding-top: 6px;
            margin-top: 4px;
            font-family: Arial, Helvetica, sans-serif;
        }

        .total-row td {
            border-bottom: none !important;
            padding: 6px 0;
        }

        .total-row .total-label {
            text-align: right;
            padding-right: 8px;
        }

        .total-row .total-value {
            text-align: right;
            font-size: 16px;
        }

        /* Phần footer */
        .footer {
            text-align: center;
            border-top: 1px dashed #000;
            padding-top: 6px;
            margin-top: 8px;
            font-size: 10px;
            color: #333;
            font-family: Arial, Helvetica, sans-serif;
        }

        .footer p {
            margin: 2px 0;
        }

        .footer .thank-you {
            font-size: 12px;
            font-weight: bold;
            margin: 4px 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        /* === ĐIỀU CHỈNH KHI IN === */
        @media print {
            body {
                width: 80mm;
                margin: 0;
                padding: 0;
                background: #fff;
            }

            .invoice-80mm {
                width: 80mm;
                padding: 1mm 2mm;
            }

            .no-print {
                display: none !important;
            }

            .page-break {
                page-break-after: always;
            }

            table {
                page-break-inside: avoid;
            }
        }

        /* === NÚT IN (chỉ hiển thị trên màn hình) === */
        .no-print {
            text-align: center;
            padding: 15px 0;
            background: #f5f5f5;
            width: 100%;
        }

        .no-print button {
            padding: 10px 25px;
            font-size: 14px;
            background: #4CAF50;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: Arial, Helvetica, sans-serif;
        }

        .no-print button:hover {
            background: #45a049;
        }

        .no-print button:last-child {
            background: #666;
            margin-left: 10px;
        }
        .no-print button:last-child:hover {
            background: #555;
        }

        /* Loading & Error */
        .loading, .error {
            text-align: center;
            padding: 20px 0;
            font-size: 13px;
            font-family: Arial, Helvetica, sans-serif;
        }
        .error { color: #c62828; }

        /* Hỗ trợ màn hình nhỏ */
        @media screen and (max-width: 80mm) {
            body {
                width: 100%;
            }
            .invoice-80mm {
                width: 100%;
                padding: 2mm 3mm;
            }
        }
    </style>
</head>
<body>

    <!-- ====== PHẦN HÓA ĐƠN (KHỔ 80MM) ====== -->
    <div class="invoice-80mm" id="invoiceContent">
        <!-- Loading -->
        <div id="loading" class="loading">⏳ Đang tải hóa đơn...</div>

        <!-- Nội dung hóa đơn (ẩn lúc đầu) -->
        <div id="invoiceData" style="display:none;">

            <!-- HEADER -->
            <div class="header">
                <div class="store-name">☕ Tạp hóa Minh</div>
                <div class="store-info">Long Giang, CM, AG</div>
                <div class="store-info">ĐT: 0974 113 120</div>
                <h1>HÓA ĐƠN</h1>
                <div class="invoice-number">#<span id="maDon"></span></div>
            </div>

            <!-- THÔNG TIN KHÁCH HÀNG -->
            <div class="customer-info">
                <p><span class="label">Khách hàng:</span> <span id="khachHang"></span></p>
                <p><span class="label">Ngày:</span> <span id="ngayBan"></span></p>
                <p><span class="label">NV:</span> <span id="nhanVien">Admin</span></p>
            </div>

            <!-- BẢNG SẢN PHẨM -->
            <table>
                <thead>
                    <tr>
                        <th class="col-stt">STT</th>
                        <th class="col-name">Tên hàng</th>
                        <th class="col-qty">SL</th>
                        <th class="col-price">ĐG</th>
                        <th class="col-amount">TT</th>
                    </tr>
                </thead>
                <tbody id="detailRows">
                    <!-- JS sẽ chèn dữ liệu vào đây -->
                </tbody>
                <tfoot>
                    <tr class="total-row">
                        <td colspan="4" class="total-label">TỔNG CỘNG</td>
                        <td class="total-value" id="tongTien">0</td>
                    </tr>
                </tfoot>
            </table>

            <!-- FOOTER -->
            <div class="footer">
                <p class="thank-you">CẢM ƠN QUÝ KHÁCH!</p>
                <p>Hàng đã bán không đổi trả</p>
                <p>--- Hóa đơn xuất từ phần mềm ---</p>
            </div>

        </div>
    </div>

    <!-- ====== NÚT IN (chỉ hiển thị trên màn hình) ====== -->
    <div class="no-print">
        <button onclick="window.print()">🖨️ In hóa đơn nhiệt</button>
        <button onclick="window.close()">✖️ Đóng</button>
    </div>

    <!-- ====== JAVASCRIPT ====== -->
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const maDon = urlParams.get('maDon');

        if (!maDon) {
            document.getElementById('loading').innerHTML =
                '<div class="error">❌ Không có mã đơn hàng</div>';
        } else {
            // === THAY URL NÀY BẰNG URL GOOGLE APPS SCRIPT CỦA BẠN ===
            const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxNTWdRVvONulNqMc8KKUHuYQTapbKCyhiODGHWFt9MGWVAzlLwT7m0KTwI5F6jI_Jn/exec';

            fetch(`${SCRIPT_URL}?maDon=${maDon}`)
                .then(res => res.json())
                .then(data => {
                    if (!data.success) {
                        throw new Error(data.error || 'Lỗi không xác định');
                    }

                    // Hiển thị dữ liệu
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('invoiceData').style.display = 'block';

                    // Điền thông tin
                    document.getElementById('maDon').textContent = data.maDon;
                    document.getElementById('khachHang').textContent = data.khachHang;
                    document.getElementById('ngayBan').textContent = data.ngay;

                    // Định dạng tiền tệ
                    const formatMoney = (num) => {
                        return Number(num).toLocaleString('vi-VN') + 'đ';
                    };

                    document.getElementById('tongTien').textContent = formatMoney(data.tongTien);

                    // Thêm chi tiết sản phẩm
                    const tbody = document.getElementById('detailRows');
                    if (data.chiTiet.length === 0) {
                        tbody.innerHTML =
                            `<tr><td colspan="5" style="text-align:center;">Không có sản phẩm</td></tr>`;
                    } else {
                        data.chiTiet.forEach((item, index) => {
                            tbody.innerHTML += `
                                <tr>
                                    <td class="col-stt">${index + 1}</td>
                                    <td class="col-name">${item.tenSanPham}</td>
                                    <td class="col-qty">${item.soLuong}</td>
                                    <td class="col-price">${formatMoney(item.donGia)}</td>
                                    <td class="col-amount">${formatMoney(item.thanhTien)}</td>
                                </tr>
                            `;
                        });
                    }

                    // Tự động bật in sau 1.5 giây
                    setTimeout(() => {
                        window.print();
                    }, 1500);
                })
                .catch(error => {
                    document.getElementById('loading').innerHTML =
                        `<div class="error">❌ Lỗi: ${error.message}</div>`;
                });
        }
    </script>

</body>
</html>
